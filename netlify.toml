[build]
  command = "npm run build"
  publish = "build/client"

[dev]
  framework = "#custom"
  command = "npm run build && react-router-serve ./build/server/index.js"
  targetPort = 3999  # From your logs (adjust if different)

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200